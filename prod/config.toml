[server]
host = "0.0.0.0"
port = 8000

[models.act-fold]
display_name = "ACT Full Fold"
policy_repo_id = "data/outputs/jhimmens_linique-act-v2/pretty-elevator-4/final"
dataset_repo_id = "jhimmens/linique-v2"
task = "full-fold-v1"
device = "cuda"
temporal_ensemble_coeff = 0.01

[models.pi0-pickup]
display_name = "Pi0 Pickup"
policy_repo_id = "data/outputs/pi0-pickup/final"
dataset_repo_id = "jhimmens/linique-v2-pickup"
task = "pickup"
device = "cuda"

[models.smolvla-napkin-fold]
display_name = "SmolVLA Napkin Fold"
policy_repo_id = "data/outputs/jhimmens_smolvla-napkin-fold"
dataset_repo_id = "jhimmens/linique-v2"
task = "full-fold-v1"
device = "cuda"

[models.smolvla-napkin-fold.rename_map]
"observation.images.left_top_cam" = "observation.images.camera1"
"observation.images.left_left_cam" = "observation.images.camera2"
"observation.images.left_right_cam" = "observation.images.camera3"

[rerun]
enabled = false
# Set enabled = true and configure ip/port to stream to a remote Rerun viewer:
# ip = "100.x.y.z"
# port = 9876

[recordings]
