# Data Taking Configuration
# Settings specific to data collection

[recording]
# Hugging Face dataset repository ID
repo_id = "jhimmens/linique"
# Task description for the recording
task = "pickup"
# Number of episodes to record
num_episodes = 50
# Duration of each episode in seconds
episode_time = 60
# Time allowed for environment reset between episodes
reset_time = 10
# Seconds of no arm movement before auto-ending an episode (0 to disable)
idle_timeout = 4
