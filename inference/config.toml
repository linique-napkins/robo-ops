# Inference Configuration

[inference]
# Trained policy to load (HuggingFace repo ID or local path)
policy_repo_id = "data/outputs/jhimmens_linique-act-v2-best-old/checkpoint-99266-interrupted"

# Dataset used for training (needed for feature definitions)
dataset_repo_id = "jhimmens/linique-v2"

# Task description (should match training)
task = "full-fold-v1"

# Device (cuda, mps, cpu)
device = "cuda"

# Control frequency
fps = 30

# Visualization
display = true

# Temporal ensembling smooths actions across overlapping chunk predictions.
# Set to null/remove to disable. 0.01 is the ACT paper default.
# Requires inference every step, so ensure your device can handle it.
temporal_ensemble_coeff = 0.01
