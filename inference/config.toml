# Inference Configuration

[inference]
# Trained policy to load (HuggingFace repo ID or local path)
policy_repo_id = "data/outputs/jhimmens_linique-act/checkpoint-1876-interrupted"

# Dataset used for training (needed for feature definitions)
dataset_repo_id = "jhimmens/linique"

# Task description (should match training)
task = "pickup"

# Device (cuda, mps, cpu)
device = "cuda"

# Control frequency
fps = 30

# Visualization
display = true
