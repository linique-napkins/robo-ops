# ACT Policy Training Configuration

[training]
# Dataset to train on (HuggingFace repo ID)
dataset_repo_id = "jhimmens/linique-v2"

# Where to push the trained model (HuggingFace repo ID)
output_repo_id = "jhimmens/linique-act-v2"

# Policy type
policy = "act"

# Training hyperparameters
steps = 100000

# Device (cuda, mps, cpu)
device = "cuda"

# Video decoder backend: "torchcodec" (default) or "pyav" (use on HPC where torchcodec fails)
video_backend = "pyav"

# ACT-specific settings
chunk_size = 100       # Number of future actions to predict
dim_model = 512        # Transformer hidden dimension
n_heads = 8            # Number of attention heads
n_encoder_layers = 4   # Number of transformer encoder layers

# Checkpointing
save_freq = 10000      # Save checkpoint every N steps
log_freq = 100         # Log metrics every N steps

# Weights & Biases
wandb_project = "linique-act"
# wandb_entity = "your-team"  # Optional: W&B team/entity name

[training.env.local]
batch_size = 8
learning_rate = 1e-5

[training.env.sockeye]
batch_size = 38
learning_rate = 4.75e-5
