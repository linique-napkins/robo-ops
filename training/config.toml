# Training Configuration

[training]
# Dataset to train on (HuggingFace repo ID)
dataset_repo_id = "jhimmens/linique"

# Where to push the trained model (HuggingFace repo ID)
output_repo_id = "jhimmens/linique-act"

# Policy type
policy = "act"

# Training hyperparameters
steps = 100000
batch_size = 8
learning_rate = 1e-5

# Device (cuda, mps, cpu)
device = "cuda"

# ACT-specific settings
chunk_size = 100       # Number of future actions to predict
dim_model = 512        # Transformer hidden dimension
n_heads = 8            # Number of attention heads
n_encoder_layers = 4   # Number of transformer encoder layers

# Output directory for checkpoints and final model
# Leave empty to use default (data/outputs/ in project root)
# On HPC, set to a writable scratch path
# output_dir = "/scratch/ss-engineeringphysics-1/$USER/training_outputs"

# Checkpointing
save_freq = 10000      # Save checkpoint every N steps
log_freq = 100         # Log metrics every N steps

# Weights & Biases
wandb_project = "linique-robot"
# wandb_entity = "your-team"  # Optional: W&B team/entity name
